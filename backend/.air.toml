root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/vereinstool ./main.go"
  bin = "./tmp/vereinstool"
  delay = 1000
  exclude_dir = ["tmp", "static", "db/generated"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "sql"]
  kill_delay = 500

[log]
  time = false

[misc]
  clean_on_exit = true
